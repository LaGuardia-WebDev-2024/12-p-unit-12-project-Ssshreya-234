<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Unit 12 Project</title>
    <link href="style.css" rel="stylesheet" type="text/css" />
  </head>
  <body>
    <h1>Quiz About [Me]</h1>
    <hr />
    <!-- Movie Question -->
    <form id="movie-form">
      <label>
        🎥 What is my favorite chldhood show?
        <select id="movie-answer">
          <option value="Spongebob">Spongebob</option>
          <option value="Gumball">Gumball</option>
          <option value="Teen-titans-go">Teen titans go</option>
          <option value="Fairly-odd-parents">Fairly odd parents</option>
        </select>
      </label>
      <button type="submit">Check Show Answer</button>
    </form>
    <div id="movie-result">
      <p id="movie-text"></p>
      <img id="movie-pic">
    </div>
    <hr />
    <!-- Book Question -->
    <form id="book-form">
      <label>
        📖 What game do I always play in this class?
        <select id="book-answer">
          <option value="book1">Slither.io</option>
          <option value="book2">Run</option>
          <option value="book3">Papas Bakeria</option>
        </select>
      </label>
      <button type="submit">Check Book Answer</button>
    </form>
    <div id="book-result">
      <p id="book-text"></p>
    </div>
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/2.1.4/jquery.min.js"></script>
    <script>
      
      //========================Movie Question jQuery Code
      $("#movie-form").on("submit", function (event) {
        event.preventDefault();

        var $answer = $("#movie-answer");
        var answer = $answer.val();

        if (answer === "Spongebob") {
          $("#movie-text").text("YESSSS!");
          $("#movie-pic").attr("src","https://www.slashfilm.com/img/gallery/how-old-is-spongebob-squarepants-his-age-explained/intro-1750722731.jpg")
        } 
        if (answer === "Gumball"){
          $("#movie-text").text("Love this show but nope");
          $("#movie-pic").attr("src","https://i.pinimg.com/736x/a5/fe/36/a5fe36be1836ec48e1964a72d07e34b2.jpg")
        }
        if (answer === "Teen-titans-go"){
          $("#movie-text").text("Nope");
          $("#movie-pic").attr("src","")
        }

        if (answer === "Fairly-odd-parents"){
          $("#movie-text").text("Nope");
        }


      });

      //=======================Book Question jQuery Code
      $("#book-form").on("submit", function (event) {
        event.preventDefault();

        var $answer = $("#book-answer");
        var answer = $answer.val();

        if (answer === "book1") {
          $("#book-text").text("YESSSS!");
        } 
        else {
          $("#book-text").text("Naur");
        }
      });
      
    </script>
  </body>

  <!--- Taken From Khan Academy HTML/JS: Making webpages interactive with jQuery-->
</html>
